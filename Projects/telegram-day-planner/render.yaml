# render.yaml — PLAN App Blueprint
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: plan-bot
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:bot
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_STT_MODEL
        value: whisper-large-v3-turbo
      - key: DATABASE_URL
        sync: false

  - type: web
    name: plan-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 3000
