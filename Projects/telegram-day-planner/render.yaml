# render.yaml — PLAN Deploy Configuration
# https://render.com/docs/yaml-spec

services:
  # === Bot Service ===
  - type: web
    name: plan-bot
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:bot
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_STT_MODEL
        value: whisper-large-v3-turbo
      - key: DATABASE_URL
        fromDatabase:
          name: plan-db
          property: connectionString

  # === API Service ===
  - type: web
    name: plan-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: plan-db
          property: connectionString
      - key: PORT
        value: 3000

  # === PostgreSQL Database ===
  - type: psql
    name: plan-db
    plan: free
    region: frankfurt
    ipAllowList: []
