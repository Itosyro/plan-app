version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: plan-postgres
    environment:
      POSTGRES_USER: plan
      POSTGRES_PASSWORD: plan
      POSTGRES_DB: plan
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U plan -d plan']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
