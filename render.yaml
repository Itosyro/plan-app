# render.yaml — Render Blueprint for plan-app
# https://render.com/docs/blueprint-spec
#
# 1. `web` — FastAPI hosting the Telegram webhook (`POST /tg/<secret>`) and,
#    later, the mini-app API (`/api/*`, Phase 5).
# 2. `cron` — `plan-app-scheduler` runs the Phase 4 worker once per minute:
#    delivers due `reminders` rows and dispatches morning/evening digests.
#    Render's free plan does NOT include cron; this service requires Starter+.
#    The Blueprint deploys regardless — adjust `plan:` if you upgrade.
#
# Secrets (`sync: false`) live in the Render dashboard, never in this file.
# `WEBHOOK_BASE_URL` is the public URL Render assigns to the web service —
# patch it in after the first deploy and Render will redeploy automatically.

services:
  - type: web
    name: plan-app
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    # Render's native Python runtime auto-detects `uv.lock` and installs uv
    # for us; we just need to invoke it.
    # `.agents/`, `docs/`, and `tests/` are repo-only assets — strip them
    # before uv builds the slug so the free-tier image stays minimal.
    buildCommand: rm -rf .agents docs tests && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEYS
        sync: false

  - type: cron
    name: plan-app-scheduler
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    schedule: "*/1 * * * *"
    buildCommand: rm -rf .agents docs tests && uv sync --frozen
    startCommand: uv run python -m app.workers.scheduler
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
