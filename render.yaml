# render.yaml — Render Blueprint for plan-app
# https://render.com/docs/blueprint-spec
#
# Single FastAPI web service hosting:
#   1. Telegram webhook (`POST /tg/<secret>`).
#   2. Future mini-app API (`/api/*`, Phase 5).
#   3. In-process scheduler loop (`app.workers.runner`) that ticks reminders
#      and digests every `SCHEDULER_TICK_INTERVAL_SECONDS` (default 60s).
#
# Why in-process? Render's free plan does NOT include standalone Cron
# services — those require Starter+. Embedding the loop keeps the deploy on
# the free tier. To stop the free dyno from going to sleep (~15 min idle)
# — which would also pause the scheduler — a second in-process task
# self-pings `/healthz` over the public URL every 10 min (see
# `app/workers/keepalive.py` and `docs/RENDER.md`). When upgrading to
# Starter+ later, set `SCHEDULER_INPROC_ENABLED=false` and
# `KEEPALIVE_ENABLED=false` here and re-add a `cron` service that runs
# `uv run python -m app.workers.scheduler`.
#
# Secrets (`sync: false`) live in the Render dashboard, never in this file.
# `WEBHOOK_BASE_URL` is the public URL Render assigns to the web service —
# patch it in after the first deploy and Render will redeploy automatically.

services:
  - type: web
    name: plan-app
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    # Render's native Python runtime auto-detects `uv.lock` and installs uv
    # for us; we just need to invoke it.
    # `.agents/`, `docs/`, and `tests/` are repo-only assets — strip them
    # before uv builds the slug so the free-tier image stays minimal.
    # The Python build image also has Node.js available, so we build the
    # Mini-App static bundle (`webapp/dist/`) here. ``app/main.py`` mounts
    # it at ``/app`` only when the directory exists, so dev runs without
    # the npm step still work.
    buildCommand: |
      set -eux
      rm -rf .agents docs tests
      uv sync --frozen
      cd webapp
      npm ci --no-audit --no-fund
      npm run build
      cd ..
    # Run Alembic migrations on every deploy so the schema follows the
    # code automatically. Free plan doesn't have ``preDeployCommand`` →
    # we prepend the upgrade step to ``startCommand`` so it runs once
    # per container start. Idempotent: on subsequent deploys with no new
    # migrations, ``alembic upgrade head`` is a few-ms no-op.
    startCommand: uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SCHEDULER_INPROC_ENABLED
        value: "true"
      - key: SCHEDULER_TICK_INTERVAL_SECONDS
        value: "60"
      # Keep-alive self-ping (prevents Render free-tier idle spin-down).
      # Disable when moving to Starter+ with a real cron service.
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_INTERVAL_SECONDS
        value: "600"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEYS
        sync: false
