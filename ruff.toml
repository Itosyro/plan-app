target-version = "py312"
line-length = 100

# Сторонние снепшоты скиллов (anthropics/skills) — не линтим, чтобы не править upstream-код.
extend-exclude = [
    ".agents/skills/skill-creator",
    ".agents/skills/mcp-builder",
    ".agents/skills/webapp-testing",
]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
]
ignore = [
    "E501",  # line too long (formatter handles it)
]

[lint.per-file-ignores]
"tests/**" = ["S101"]
"alembic/**" = ["E402"]

[format]
quote-style = "double"
indent-style = "space"
